<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#f6d8d3" />
  <title>Pathway — WebGL Laser Puzzle</title>
  <meta name="description" content="Rotate glass lenses, bend the beam, and light the bulb across 30 handcrafted WebGL puzzle levels." />
  <meta property="og:title" content="Pathway — WebGL Laser Puzzle" />
  <meta property="og:description" content="A calm laser-reflection puzzle about glass, light, and alignment." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Ole&family=Marcellus&display=swap" rel="stylesheet" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="appShell" aria-label="Pathway WebGL laser puzzle">
    <canvas id="gameCanvas" aria-label="Pathway puzzle board"></canvas>


    <section id="startScreen" class="gameStart" aria-label="Start screen">
      <div class="startMark">LASER PUZZLE</div>
      <h1 class="startTitle">Pathway</h1>
      <p class="startMechanic">Rotate glass. Bend light. Hit the bulb.</p>
      <button id="startButton" class="gameButton bigButton" type="button">Set the Beam</button>
    </section>

    <section id="topHud" class="gameHud hidden" aria-live="polite">
      <div id="levelStamp" class="levelStamp">LEVEL 01</div>
      <h2 id="levelTitle" class="levelTitle">First Reflection</h2>
      <p id="levelMood" class="levelMood">Peach Dawn</p>
      <p id="objective" class="objective">Rotate the glass so the beam hits the bulb.</p>
    </section>

    <section id="bottomHud" class="bottomBar hidden" aria-label="Game controls">
      <div class="bottomControls">
        <button id="resetButton" class="gameButton smallButton" type="button" aria-label="Reset level">↺ Reset</button>
        <button id="soundButton" class="gameButton iconButton" type="button" aria-label="Mute music and sound effects">Audio On</button>
      </div>
      <div id="statusText" class="statusText">BEAM MISSING</div>
    </section>

    <section id="levelResult" class="resultOverlay hidden" aria-live="assertive">
      <div id="resultKicker" class="resultKicker">TARGET HIT</div>
      <h2 id="resultTitle" class="resultTitle">Path set</h2>
      <button id="nextButton" class="gameButton bigButton" type="button">Next Level</button>
    </section>

    <audio id="bgMusic" src="music/rotating-puzzle-room.mp3" preload="auto" loop playsinline></audio>
  </main>

  <script src="main.js"></script>
</body>
</html>
